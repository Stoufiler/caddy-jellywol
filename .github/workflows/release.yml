name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y upx-ucl

      - name: Build binaries
        env:
          CGO_ENABLED: 0
        run: |
          version="${{ github.ref_name }}"

          # Build for all platforms
          for goos in linux darwin windows; do
            for goarch in amd64 arm64; do
              # Skip windows arm64
              if [ "$goos" = "windows" ] && [ "$goarch" = "arm64" ]; then
                continue
              fi

              output="jellywolproxy-${goos}-${goarch}"
              if [ "$goos" = "windows" ]; then
                output="${output}.exe"
              fi

              echo "Building ${output}..."
              GOOS=$goos GOARCH=$goarch go build \
                -ldflags="-s -w -X main.version=${version}" \
                -trimpath \
                -o "dist/${output}" \
                ./cmd/jellywolproxy

              # Compress binary (except for Darwin due to notarization)
              if [ "$goos" != "darwin" ]; then
                upx --best --lzma "dist/${output}" 2>/dev/null || echo "UPX failed for ${output}, skipping compression"
              fi
            done
          done

      - name: Create archives and checksums
        run: |
          cd dist

          # Create archives
          for file in jellywolproxy-*; do
            if [[ $file == *.exe ]]; then
              # Windows: zip
              zip "${file%.exe}.zip" "$file"
              rm "$file"
            else
              # Linux/macOS: tar.gz
              tar czf "${file}.tar.gz" "$file"
              rm "$file"
            fi
          done

          # Generate checksums
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Generate SBOM
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft packages . -o spdx-json=dist/sbom.spdx.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
            dist/sbom.spdx.json
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{ version }}
            type=semver,pattern={{ major }}.{{ minor }}
            type=semver,pattern={{ major }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
